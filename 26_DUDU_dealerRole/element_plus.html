<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element Plus CDN - Composition API</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-plus/dist/index.css"
    />
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://unpkg.com/element-plus"></script>
  </head>
  <body>
    <div id="app">
      <el-button plain @click="dialogVisible = true">
        Click to open the Dialog
      </el-button>

      <el-dialog
        v-model="dialogVisible"
        title="Tips"
        width="500px"
        :before-close="handleClose"
      >
        <span>This is a message</span>
        <template #footer>
          <div class="dialog-footer">
            <el-button @click="dialogVisible = false">Cancel</el-button>
            <el-button type="primary" @click="dialogVisible = false">
              Confirm
            </el-button>
          </div>
        </template>
      </el-dialog>
    </div>

    <script>
      // 1. 從全域變數解構所需的 Vue 方法
      const { createApp, ref } = Vue;
      // 2. 從全域變數解構 Element Plus 的模組
      // 解決 JavaScript 認不得 Element 函式 的問題
      const { ElMessageBox } = ElementPlus;

      const app = createApp({
        setup() {
          const dialogVisible = ref(false);

          const handleClose = (done) => {
            ElMessageBox.confirm("Are you sure to close this dialog?")
              .then(() => {
                done();
              })
              .catch(() => {
                // catch error
              });
          };

          // 3. 必須將 Template 會用到的變數與函式 return 出去
          return {
            dialogVisible,
            handleClose,
          };
        },
      });

      // 安裝plugin 把 Element Plus 的組件註冊到 Vue 全域，這樣在 Template 中就可以直接使用 Element Plus 的組件了
      // 解決了 HTML 認不得 Element 標籤 的問題
      app.use(ElementPlus);
      app.mount("#app");
    </script>
  </body>
</html>
