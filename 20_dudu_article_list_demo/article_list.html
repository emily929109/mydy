<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUDUPAY 文章列表</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: var(--falcon-body-font-family);
        font-size: var(--falcon-body-font-size);
        font-weight: var(--falcon-body-font-weight);
        line-height: var(--falcon-body-line-height);
        color: var(--falcon-body-color);
        text-align: var(--falcon-body-text-align);
        background-color: white;
        /*#c4dedb;*/
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      }

      .button {
        font-size: calc(15px + 15 * ((100vw - 375px) / 1545));
        display: inline-block;
        padding: 3px 20px;
        background-color: #00af9a;
        color: #fff;
        text-align: center;
        cursor: pointer;
        border-radius: 8px;
        font-weight: 700;
      }

      .button:hover {
        background-color: #f5ac48;
        color: #fff;
        text-decoration: none;
      }

      a:hover {
        text-decoration: none;
      }
      /*========banner滿版修改========*/

      .news-item img {
        width: 100%;
        transition: transform 0.5s ease;
      }

      /*========newslist修改========*/
      .news-list.row {
        max-width: 1200px;
        padding: 80px 0;
      }

      .news-item {
        position: relative;
        transition: all 0.5s ease;
        opacity: 0;
        cursor: pointer;
      }

      .news-item-img {
        aspect-ratio: 1/1;
        border-radius: 20px;
      }

      .news-item-text {
        position: relative;
        bottom: 0;
        background: #ffffff;
        margin-left: 35px;
        margin-top: -50px;
        padding: 16px 55px 16px 24px;
        border-radius: 12px;
        transition: all 0.5s ease;
        box-shadow: 0px 5px 15px 0px rgba(0, 0, 0, 0.2);
        position: relative;
      }

      .news-item-text p {
        letter-spacing: 1px;
        color: #040404;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        /* max-height: 106px;*/
      }

      .news-item span {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background-color: #00ab98;
        position: absolute;
        right: 35px;
        bottom: 20px;
        overflow: hidden;
        border: 1px solid transparent;
      }

      .news-item span i {
        color: #fff;
      }

      /*hover效果*/
      .news-item:hover img {
        -webkit-transform: scale(1.1);
        transform: scale(1.1);
      }

      .news-item:hover .news-item-text {
        background-color: #00ab98;
        color: #fff;
      }

      .news-item:hover .news-item-text p {
        color: #fff;
      }

      .news-item span::after {
        position: absolute;
        content: "";
        inset: 0px;
        background-color: #fff;
        transition: transform 0.3s ease-in-out;
        transform: translateX(-100%);
        width: 30px;
        height: 32px;
      }

      .news-item:hover span::after {
        transform: translateX(0);
      }

      .news-item:hover span {
        border-color: #00ab98;
      }

      .news-item:hover span i {
        color: #00ab98;
        z-index: 2;
      }

      /*==============.fade-in==============*/
      .fade-in {
        animation: smooth 0.8s ease-in-out forwards;
      }

      @keyframes smooth {
        0% {
          opacity: 0;
          -webkit-transform: translateX(20px);
          transform: translateX(20px);
        }

        100% {
          opacity: 1;
          -webkit-transform: translateX(0);
          transform: translateX(0);
        }
      }

      /*==============swiper==============*/
      .banner-container {
        max-width: 1000px;
      }

      .banner .swiper-slide {
        border-radius: 1.5em;
        overflow: hidden;
      }

      .banner-container .swiper-button-prev,
      .banner-container .swiper-button-next {
        opacity: 1;
        color: #00a58d;
        height: 240px;
        background-color: rgb(205, 240, 236);
        border-radius: 8px;
        box-shadow: none;
        width: 3rem;
        top: 50%;
        transform: translateY(-50%);
      }

      .banner-container .swiper-button-prev {
        left: -88px;
      }

      .banner-container .swiper-button-next {
        right: -88px;
      }

      .banner-container .swiper-navigation-icon {
        width: 40%;
      }

      .banner-container .swiper-navigation-icon path {
        stroke-width: 1px;
        stroke: currentColor;
      }

      .swiper-pagination-bullet {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        opacity: 1;
        background-color: #989898;
      }

      .swiper-pagination-bullet.swiper-pagination-bullet-active {
        width: 20px;
        height: 20px;
        background-color: #00ab98;
      }

      .banner-container .swiper-pagination {
        bottom: -50px;
        align-items: center;
      }

      @media (min-width: 1281px) {
        .banner-container {
          max-width: 1200px;
        }
      }

      @media (max-width: 992px) {
        .banner-container {
          margin-left: -1rem !important;
          margin-right: -1rem !important;
        }

        .banner .swiper-slide {
          border-radius: 0;
        }
      }

      /*==============category-tabs==============*/
      .category-tabs {
        max-width: 1200px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        padding: 0 20px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-top: 80px;
        margin-bottom: -40px;
        position: relative;
        z-index: 10;
      }

      .tab-item {
        padding: 20px 0;
        cursor: pointer;
        font-weight: 500;
        color: #666;
        transition: all 0.3s ease;
        position: relative;
        flex: 1;
        text-align: center;
        font-size: 1.1rem;
      }

      .tab-item:hover {
        color: #00ab98;
      }

      .tab-item.active {
        color: #00ab98;
        font-weight: 700;
      }

      .tab-item::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 3px;
        background-color: #00ab98;
        transition: width 0.3s ease;
      }

      .tab-item.active::after {
        width: 60%;
      }

      /*==============已結束標籤==============*/
      .news-item.ended .news-item-img {
        position: relative;
      }

      .news-item.ended .news-item-img::before {
        content: "已結束";
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(43, 43, 43, 0.85);
        color: #fff;
        padding: 10px 25px;
        font-size: 1.1rem;
        font-weight: 500;
        border-bottom-right-radius: 20px;
        z-index: 5;
        letter-spacing: 2px;
      }

      /*==============內頁樣式 (Blog Info)==============*/
      .blog-info-container {
        max-width: 900px;
        margin: 40px auto 100px auto;
        padding: 0 20px;
      }

      .blog-info-banner {
        width: 100%;
        border-radius: 20px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .blog-info-title {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 25px;
        line-height: 1.4;
      }

      .blog-info-content {
        font-size: 1rem;
        line-height: 1.8;
        color: #444;
      }

      .blog-info-content p {
        margin-bottom: 1.5rem;
      }

      .blog-info-content h1,
      .blog-info-content h2,
      .blog-info-content h3 {
        color: #00ab98;
        margin-top: 2rem;
        margin-bottom: 1rem;
      }

      .blog-info-content video {
        width: 100%;
        max-width: 100%;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        display: block;
        max-width: 400px;
        margin: 0 auto;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        color: #00ab98;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 20px;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        color: #f5ac48;
        transform: translateX(-5px);
      }

      .back-btn i {
        margin-right: 8px;
      }

      @media (max-width: 768px) {
        .category-tabs {
          margin: 40px 1rem -20px 1rem;
          padding: 0 10px;
        }
        .tab-item {
          font-size: 0.9rem;
          padding: 15px 0;
        }
        .blog-info-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 列表頁顯示容器 -->
      <div v-show="isListView">
        <div class="banner-container mx-auto position-relative">
          <div class="banner swiper mt-4">
            <div class="swiper-wrapper">
              <div
                class="swiper-slide"
                v-for="banner in banners"
                :key="banner.alt"
              >
                <a :href="banner.href" target="_blank">
                  <img
                    class="d-block w-100 swiper-lazy swiper-lazy-loaded"
                    :src="banner.img"
                    :alt="banner.alt"
                  />
                </a>
              </div>
            </div>
          </div>

          <div class="swiper-pagination d-flex justify-content-center"></div>

          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>

        <!--============文章類別 Tab 開始=============-->
        <div class="category-tabs mx-auto">
          <div
            class="tab-item"
            :class="{ active: currentCategory === '全部' }"
            @click="changeCategory('全部')"
          >
            全部
          </div>
          <div
            class="tab-item"
            :class="{ active: currentCategory === '最新消息' }"
            @click="changeCategory('最新消息')"
          >
            最新消息
          </div>
          <div
            class="tab-item"
            :class="{ active: currentCategory === '寵物相關' }"
            @click="changeCategory('寵物相關')"
          >
            寵物相關
          </div>
          <div
            class="tab-item"
            :class="{ active: currentCategory === '已結束活動' }"
            @click="changeCategory('已結束活動')"
          >
            已結束活動
          </div>
        </div>
        <!--============文章類別 Tab 結束=============-->

        <!--============news-list 開始=============-->
        <div class="news-list mx-auto py-7 row section">
          <!--item-->
          <div
            class="news-item col-12 col-md-6 col-lg-4 mb-4"
            :class="{ ended: news.category === '已結束活動' }"
            v-for="(news, index) in filteredNews"
            :key="index"
            :style="{ animationDelay: (index % 3) * 0.2 + 's' }"
            @click="viewArticle(news)"
          >
            <div class="news-item-img overflow-hidden">
              <img :src="news.img" />
            </div>
            <div class="fs-4 news-item-text">
              <p>{{ news.text }}</p>
            </div>
            <span class="align-items-center d-flex justify-content-center p-1">
              <i class="fa-solid fa-arrow-right"></i>
            </span>
          </div>
          <!--============news-list 結束=============-->
        </div>
      </div>

      <!-- 內頁顯示容器 (Blog Info) -->
      <div
        v-if="!isListView && currentArticle"
        class="blog-info-container fade-in"
      >
        <div class="back-btn" @click="goBack">
          <i class="fa-solid fa-chevron-left"></i> 返回文章列表
        </div>

        <img
          :src="currentArticle.banner"
          :alt="currentArticle.title"
          class="blog-info-banner"
        />

        <h2 class="blog-info-title">{{ currentArticle.title }}</h2>

        <!-- 直接使用 currentArticle.txt 進行渲染 -->
        <div class="blog-info-content" v-html="currentArticle.txt"></div>

        <div class="mt-5 text-center">
          <div class="button" @click="goBack">回文章列表</div>
        </div>
      </div>
    </div>

    <!-- 載入 Vue 3 (CDN) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script>
      const { createApp, ref, onMounted, nextTick, computed } = Vue;

      const app = createApp({
        setup() {
          const banners = ref([
            {
              href: "~/Home/News/yilan",
              img: "./img/news/yilan/banner_1550x600.jpg",
              alt: "宜蘭兩天一夜遊",
            },
            {
              href: "~/Home/News/periodontitis",
              img: "./img/news/periodontitis/banner_1550x600.jpg",
              alt: "狗狗牙周病",
            },
            {
              href: "~/Home/News/games",
              img: "./img/news/games/banner_1550x600.jpg",
              alt: "程泓電玩",
            },
            {
              href: "~/Home/News/hospitals",
              img: "./img/news/hospitals/BN.png",
              alt: "DUDUPAY 攜手多家動物醫院",
            },
            {
              href: "~/Home/News/trip",
              img: "./img/news/17trip/17tripBN.jpg",
              alt: "17trip banner",
            },
            {
              href: "~/Home/News/fukuoka",
              img: "./img/news/fukuoka/fukuoka_BN.png",
              alt: "fukuoka banner",
            },
          ]);

          const allNews = ref([]);
          const newsData = ref([]); // 存儲詳細文章內容
          const currentCategory = ref("全部");
          const isListView = ref(true);
          const currentArticle = ref(null);
          const listScrollY = ref(0);

          const filteredNews = computed(() => {
            if (currentCategory.value === "全部") return allNews.value;
            return allNews.value.filter(
              (news) => news.category === currentCategory.value,
            );
          });

          const initPlugins = () => {
            // IntersectionObserver 初始化
            const options_x = {
              root: null,
              threshold: 0.1,
            };
            const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add("fade-in");
                  observer.unobserve(entry.target);
                }
              });
            }, options_x);

            const target = document.querySelectorAll(".section .news-item");
            target.forEach((el) => {
              el.classList.remove("fade-in"); // 重置動畫
              observer.observe(el);
            });

            // Swiper 初始化 (僅在尚未初始化時執行，或重新初始化)
            const swiper = new Swiper(".swiper", {
              loop: true,
              pagination: {
                el: ".swiper-pagination",
                clickable: true,
              },
              navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
              },
            });
          };

          const fetchNews = async () => {
            try {
              // 同時取得列表與詳細資料
              const [listRes, dataRes] = await Promise.all([
                axios.get("news.json"),
                axios.get("news_data.json"),
              ]);

              allNews.value = Array.isArray(listRes.data) ? listRes.data : [];
              newsData.value = Array.isArray(dataRes.data) ? dataRes.data : [];

              // 檢查初始 URL 是否有文章 ID
              const params = new URLSearchParams(window.location.search);
              const articleId = params.get("id");
              if (articleId && Array.isArray(newsData.value)) {
                const article = newsData.value.find((a) => a.id === articleId);
                if (article) {
                  currentArticle.value = article;
                  isListView.value = false;
                }
              }

              nextTick(() => {
                initPlugins();
              });
            } catch (error) {
              console.error("無法取得新聞資料:", error);
            }
          };

          const changeCategory = (category) => {
            currentCategory.value = category;

            // 更新網址參數 (不重整頁面)
            const url = new URL(window.location);
            if (category === "全部") {
              url.searchParams.delete("category");
            } else {
              url.searchParams.set("category", category);
            }
            url.searchParams.delete("id"); // 切換類別時清除文章ID

            window.history.pushState({ category, view: "list" }, "", url);

            nextTick(() => {
              initPlugins();
            });
          };

          const viewArticle = (news) => {
            // 根據列表json物件中的 href 取得文章 id
            const hrefParams = new URLSearchParams(news.href.split("?")[1]);
            const id = hrefParams.get("id");
            const article = newsData.value.find((a) => a.id === id);

            if (article) {
              listScrollY.value = window.scrollY; // 儲存列表目前捲動位置

              currentArticle.value = article;
              isListView.value = false;

              const url = new URL(window.location);
              url.searchParams.set("id", id);
              window.history.pushState({ id, view: "detail" }, "", url);

              nextTick(() => {
                window.scrollTo(0, 0); // DOM 更新後才執行，避免行動裝置版面重算覆蓋 scroll
              });
            } else {
              // 如果沒找到對應 ID，則嘗試開啟原始連結
              window.open(news.href, "_blank");
            }
          };

          const goBack = () => {
            isListView.value = true;
            currentArticle.value = null;

            const url = new URL(window.location);
            url.searchParams.delete("id");
            window.history.pushState({ view: "list" }, "", url);

            nextTick(() => {
              window.scrollTo(0, listScrollY.value); // 還原離開列表前的捲動位置
              initPlugins();
            });
          };

          // 處理瀏覽器前進/後退
          window.onpopstate = (event) => {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get("id");
            const category = params.get("category") || "全部";

            if (articleId) {
              const article = newsData.value.find((a) => a.id === articleId);
              if (article) {
                listScrollY.value = window.scrollY; // 儲存列表捲動位置
                currentArticle.value = article;
                isListView.value = false;
                nextTick(() => {
                  window.scrollTo(0, 0); // DOM 更新後才執行
                });
              }
            } else {
              isListView.value = true;
              currentArticle.value = null;
              currentCategory.value = category;
              nextTick(() => {
                window.scrollTo(0, listScrollY.value); // 還原列表捲動位置
                initPlugins();
              });
            }
          };

          onMounted(() => {
            // 從 URL 初始化類別
            const params = new URLSearchParams(window.location.search);
            const category = params.get("category");
            if (category) {
              currentCategory.value = category;
            }

            fetchNews();
          });

          return {
            banners,
            allNews,
            currentCategory,
            filteredNews,
            isListView,
            currentArticle,
            changeCategory,
            viewArticle,
            goBack,
          };
        },
      });

      app.mount("#app");
    </script>
    <script
      src="https://kit.fontawesome.com/7c6bbc6b90.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
