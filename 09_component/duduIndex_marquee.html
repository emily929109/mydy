<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>duduIndex_marquee</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style>
      /*==========3大特色修改=============*/
      .title {
        color: var(--color-dark-blue);
        font-family: "Chiron GoRound TC", sans-serif;
        letter-spacing: 2px;
      }

      .features-item img {
        max-height: 150px;
      }

      .features-title {
        color: var(--color-dark-blue);
      }

      .features-text {
        color: #6e6d6d;
      }
      /*==========背景偽元素=============*/
      .features::before,
      .features::after {
        font-size: 15vw;
        letter-spacing: 20px;
        color: #fff;
        font-family: "Poppins", sans-serif;
        position: absolute;
        text-shadow:
          -1px -1px 0 #e4f6f4,
          1px -1px 0 #e4f6f4,
          -1px 1px 0 #e4f6f4,
          1px 1px 0 #e4f6f4;
        font-weight: 900;
        z-index: -1;
        white-space: nowrap;
        pointer-events: none;
      }

      .features::before {
        content: "DUDU";
        top: 0;
        animation: marquee-left 50s linear infinite;
      }

      .features::after {
        content: "PAY";
        bottom: -146px;
        animation: marquee-right 50s linear infinite;
      }

      @keyframes marquee-left {
        0% {
          left: 100%;
          transform: translateX(0);
        }
        100% {
          left: 0;
          transform: translateX(-100%);
        }
      }

      @keyframes marquee-right {
        0% {
          left: 0;
          transform: translateX(-100%);
        }
        100% {
          left: 100%;
          transform: translateX(0);
        }
      }

      @media (max-width: 1500px) {
        .features::after {
          bottom: 45px;
        }
      }

      @media (max-width: 768px) {
        .features::before {
          font-size: 23vw;
          top: 67px;
        }

        .features::after {
          bottom: 5px;
          font-size: 23vw;
        }
      }

      .features {
        position: relative;
        margin: 0 auto;
        overflow: hidden; /* 🌟 確保跑馬燈不超出邊界 */
      }

      /*==============rwd修正==============*/
      .features,
      .register-link p,
      .brand-text,
      .brand-ex,
      .store-product,
      .news,
      .feedback-list,
      .news-card-wrapper {
        max-width: 1000px;
      }

      .banner-wrapper {
        max-width: 950px;
      }

      @media (min-width: 1441px) {
        .banner-wrapper {
          max-width: 1100px;
        }
      }

      @media (min-width: 1281px) {
        .features,
        .register-link p,
        .brand-text,
        .brand-ex,
        .store-product,
        .news,
        .feedback-list,
        .news-card-wrapper {
          max-width: 1200px;
        }
      }

      /*==========按鈕熊熊升起效果 開始 =============*/
      .register-link p {
        color: #fff;
        background-color: transparent;
        border-radius: 8px;
        position: relative;
        cursor: pointer;
        margin-bottom: 0;
        z-index: 1;
        clip-path: polygon(0% -500%, 100% -500%, 100% 100%, 0% 100%);
        animation: buttonPulse 3s infinite ease-in-out;
        transition: color 0.3s ease;
      }

      @keyframes buttonPulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 171, 151, 0.4);
        }
        50% {
          transform: scale(1.02);
          box-shadow: 0 0 15px 5px rgba(0, 171, 151, 0.2);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 171, 151, 0);
        }
      }

      .register-link p:hover {
        color: black;
        clip-path: polygon(0% -500%, 100% -500%, 100% 120%, 0% 120%);
        animation-play-state: paused;
        transition: clip-path 0.3s 0.3s ease-out;
      }

      /* 🌟 按鈕背景層 + 流光效果 */
      .register-link p::after {
        content: "";
        position: absolute;
        inset: 0;
        /* 🌟 漸層包含掃過的白光 */
        background: linear-gradient(
          110deg,
          #00ab97 40%,
          rgb(0 150 136 / 60%) 50%,
          #00ab97 60%
        );
        background-size: 200% 100%;
        border-radius: 8px;
        z-index: -2;
        transition: background-color 0.3s ease;
        animation: shimmerSweep 8s infinite linear;
      }

      @keyframes shimmerSweep {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      .register-link p:hover::after {
        background: #ffc843;
      }

      /* 🌟 熊熊層 (夾在背景與文字中間) */
      .register-link p::before {
        content: "";
        width: 210px;
        height: 170px;
        display: block;
        position: absolute;
        background-image: url(img/bear.png);
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center bottom;
        bottom: -15px;
        left: 80px;
        z-index: -1;
        opacity: 0;
        transform: translateY(180px);
        /* 🌟 前快後慢的高級曲線 */
        transition:
          transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.4s ease;
      }

      .register-link p:hover::before {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 768px) {
        .register-link p::before {
          left: 15px;
          width: 140px;
          height: 115px;
        }
      }

      @media (max-width: 576px) {
        .register-link p::before {
          width: 100px;
          height: 82px;
          bottom: -8px;
          left: 5px;
        }
      }

      /*==========按鈕熊熊升起效果 結束 =============*/
      .features {
        position: relative;
        margin: 0 auto;
      }

      .features span {
        color: #00b7a6;
        text-shadow:
          1px 2px 0px #fff,
          5px 3px 0px #005f66;
        font-size: 100px;
        font-weight: bold;
        line-height: 65%;
      }

      @media (max-width: 576px) {
        .features-item {
          padding: 0;
        }

        .features-title {
          font-size: 22px !important;
        }

        .features-text {
          font-size: 17px !important;
        }

        .features span {
          font-size: 60px;
        }
      }
    </style>
  </head>
  <body>
    <div class="section features mt-4 mt-md-7 text-center fadeUp">
      <div class="title fs-1 fw-bold text-center">DUDUPAY</div>
      <!--fs-4 fs-md-6-->
      <div class="title fs-1 fw-bold text-center mb-4">
        <span class="me-3">3</span>大特色
      </div>
      <div class="container-fluid">
        <div class="row justify-content-center">
          <!--item-1-->
          <div class="features-item col-12 col-md-4 mb-4">
            <img class="mb-3" src="img/apple.png" />
            <div class="features-title fs-2 fs-md-3 mb-2 mb-md-4">
              新型額度數位分期支付
            </div>
            <div class="features-text fs-3">
              <!--fs-1 fs-md-2-->
              毛孩消費 / 美容 / 旅遊 / 機車<br />
              都可輕鬆分期付款無負擔
            </div>
          </div>
          <!--item-2-->
          <div class="features-item col-12 col-md-4 mb-4">
            <img class="mb-3" src="img/apple.png" />
            <div class="features-title fs-2 fs-md-3 mb-2 mb-md-4">
              線上一鍵申辦
            </div>
            <div class="features-text fs-3">
              DUDUPAY 官方網站申辦<br />
              全線上申請，簡單快速
            </div>
          </div>
          <!--item-3-->
          <div class="features-item col-12 col-md-4 mb-4">
            <img class="mb-3" src="img/apple.png" />
            <div class="features-title fs-2 fs-md-3 mb-2 mb-md-4">
              安全支付工具
            </div>
            <div class="features-text fs-3">
              獨立伺服器&驗證簡訊保護個資<br />
              防盜刷超安心！
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 立即線上申辦 -->
    <div class="mb-7 register-link section text-center mt-0 mt-md-5">
      <a href="~/Home/Register" target="_blank">
        <p class="fs-2 fs-md-3 py-3 py-md-4 mx-auto">立即線上申辦</p>
      </a>
    </div>
  </body>
</html>
