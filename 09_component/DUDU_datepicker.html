<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUDU Datepicker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/element-plus/dist/index.css"
    />
    <style>
      [v-cloak] {
        display: none;
      }

      .demo-date-picker {
        display: flex;
        width: 100%;
        padding: 0;
        flex-wrap: wrap;
      }

      .demo-date-picker .block {
        padding: 1.5rem 0;
        text-align: center;
        border-right: solid 1px var(--el-border-color);
        flex: 1;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .demo-date-picker .block:last-child {
        border-right: none;
      }

      .demo-date-picker .demonstration {
        display: block;
        color: var(--el-text-color-secondary);
        font-size: 14px;
        margin-bottom: 1rem;
        width: 100%;
      }

      @media screen and (max-width: 1200px) {
        .demo-date-picker .block {
          flex: 0 0 50%;
          border-bottom: solid 1px var(--el-border-color);
        }

        .demo-date-picker .block:nth-child(2n) {
          border-right: none;
        }

        .demo-date-picker .block:nth-last-child(-n + 2):nth-child(2n + 1),
        .demo-date-picker .block:last-child {
          border-bottom: none;
        }
      }

      @media screen and (max-width: 768px) {
        .demo-date-picker .block {
          flex: 0 0 100%;
          padding: 1rem 0;
          min-width: auto;
          border-right: none;
          border-bottom: solid 1px var(--el-border-color);
        }

        .demo-date-picker .block:last-child {
          border-bottom: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <el-config-provider :locale="zhTw">
        <div class="demo-date-picker">
          <div class="block">
            <span class="demonstration">Use value-format</span>
            <div class="demonstration">Value：{{ value2 }}</div>
            <el-date-picker
              v-model="value2"
              type="date"
              placeholder="請選擇日期"
              format="YYYY/MM/DD"
              value-format="YYYY-MM-DD"
            />
          </div>
        </div>
      </el-config-provider>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/element-plus/dist/locale/zh-tw.min.js"></script>
    <script>
      const { createApp, ref, onMounted, nextTick } = Vue;

      const app = createApp({
        setup() {
          const value2 = ref("");
          const zhTw = ElementPlusLocaleZhTw;

          onMounted(() => {
            nextTick(() => {
              // DOM 已完成渲染，可在此處執行依賴 DOM 的操作
            });
          });

          return { value2, zhTw };
        },
      });

      app.use(ElementPlus);
      app.mount("#app");
    </script>
  </body>
</html>
