<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUDU Datepicker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="//unpkg.com/element-plus/dist/index.css" />
    <style>
      :root {
        /* 直接把 Element Plus 的主色調換成您們公司的品牌色 */
        --el-color-primary: #ff5722;
      }

      [v-cloak] {
        display: none;
      }

      .demonstration {
        display: block;
        /* color: var(--el-text-color-secondary); */
        font-size: 14px;
        margin-bottom: 1rem;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app" v-cloak>
      <div class="block">
        <span class="demonstration">Use value-format</span>
        <div class="demonstration">Value：{{ value2 }}</div>
        <el-date-picker
          v-model="value2"
          type="date"
          placeholder="請選擇日期"
          format="YYYY/MM/DD"
          value-format="YYYY-MM-DD"
        />
      </div>
    </div>

    <!-- Import Vue 3 -->
    <script src="//unpkg.com/vue@3"></script>
    <!-- Import component library -->
    <script src="//unpkg.com/element-plus"></script>
    <script>
      const { createApp, ref, onMounted, nextTick } = Vue;

      // 繁體中文 locale（datepicker 所需部分）
      const zhTw = {
        name: 'zh-tw',
        el: {
          datepicker: {
            now: '此刻', today: '今天', cancel: '取消', clear: '清除', confirm: '確定',
            selectDate: '選擇日期', selectTime: '選擇時間',
            startDate: '開始日期', startTime: '開始時間',
            endDate: '結束日期', endTime: '結束時間',
            prevYear: '前一年', nextYear: '後一年',
            prevMonth: '上個月', nextMonth: '下個月',
            year: '年',
            month1: '1 月', month2: '2 月', month3: '3 月', month4: '4 月',
            month5: '5 月', month6: '6 月', month7: '7 月', month8: '8 月',
            month9: '9 月', month10: '10 月', month11: '11 月', month12: '12 月',
            weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' },
            months: {
              jan: '一月', feb: '二月', mar: '三月', apr: '四月',
              may: '五月', jun: '六月', jul: '七月', aug: '八月',
              sep: '九月', oct: '十月', nov: '十一月', dec: '十二月',
            },
          },
        },
      };

      const app = createApp({
        setup() {
          const value2 = ref("");

          onMounted(() => {
            nextTick(() => {
              // DOM 已完成渲染，可在此處執行依賴 DOM 的操作
            });
          });

          return { value2 };
        },
      });

      app.use(ElementPlus, { locale: zhTw });
      app.mount("#app");
    </script>
  </body>
</html>
