<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜尋框組件展示</title>
    <!-- 引入 FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --search-bg: #ffffff;
            --search-border: #e0e0e0;
            --search-focus-border: #333333;
            --icon-color: #757575;
            --clear-bg: #5f6368;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
            --shadow-hover: 0 5px 15px rgba(0,0,0,0.15);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .search-container {
            position: relative;
            width: 400px;
            transition: all 0.3s ease;
        }

        /* 1. hover input時微微上移 */
        .search-container:hover {
            transform: translateY(-4px);
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 45px; /* 為左右圖標預留空間 */
            font-size: 16px;
            border: 1px solid var(--search-border);
            border-radius: 12px; /* 依照圖片設計較大的圓角 */
            background-color: var(--search-bg);
            box-shadow: var(--shadow);
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* 2. focus input時出現深色邊框 */
        .search-input:focus {
            border-color: var(--search-focus-border);
            box-shadow: var(--shadow-hover);
        }

        /* 左側放大鏡圖標 */
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 18px;
            pointer-events: none;
        }

        /* 右側清除按鈕樣式 */
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            background-color: var(--clear-bg);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
        }

        /* 3. 打字時出現叉叉 */
        .clear-btn.active {
            opacity: 1;
            visibility: visible;
        }

        .clear-btn:hover {
            background-color: #3c4043;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" class="search-input" placeholder="搜尋內容..." id="searchInput">
        <!-- 清除按鈕 -->
        <div class="clear-btn" id="clearBtn">
            <i class="fa-solid fa-xmark"></i>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');

        // 監聽輸入事件：控制叉叉顯示
        searchInput.addEventListener('input', () => {
            if (searchInput.value.trim().length > 0) {
                clearBtn.classList.add('active');
            } else {
                clearBtn.classList.remove('active');
            }
        });

        // 4. 按叉叉清除文字
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.classList.remove('active');
            searchInput.focus(); // 清除後焦點回到輸入框
        });
    </script>

</body>
</html>
