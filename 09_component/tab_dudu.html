<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tab_dudu</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style>
      /*==========news=============*/
      .news ol {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .news {
        color: #003048;
      }

      .news a {
        color: inherit;
        text-decoration: none;
      }

      .news-date {
        margin: 0;
        color: #6f6e6e;
      }

      .news-item {
        border-bottom: 1px solid #e1e1e2;
        position: relative;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .news-item i {
        color: #00ab96;
      }

      .news a:hover {
        text-decoration: none;
        color: #00ab96;
        font-weight: bold;
      }

      /*button共用*/
      button.news-more {
        background-color: #00ab96;
        color: #fff;
        outline: none;
        border: none;
        width: 100%;
        max-width: 250px;
        border-radius: 8px;
        font-family: "Chiron GoRound TC", sans-serif;
        border: 1px solid transparent;
        transition: all 0.3s ease;
      }

      .news-more::after {
        content: "";
        width: 0;
        border-right-width: 0;
        border-left-width: 10px;
        border-left-color: blue;
        border-top-width: 10px;
        border-bottom-width: 10px;
        height: 0;
        z-index: 9;
        position: relative;
        display: inline-block;
        margin-left: 10px;
        border: 7px solid #fff;
        border-right-width: 0;
        border-top-color: transparent;
        border-bottom-color: transparent;
        vertical-align: inherit;
      }

      button.news-more:hover {
        color: #0b1f41;
        border-color: #0b1f41;
        background-color: #fff;
      }

      button.news-more:hover::after {
        border-left-color: #0b1f41;
      }

      /*tab*/
      .news .tablinks {
        width: 50%;
        background-color: #fff;
        outline: none;
        padding: 8px 0;
        border-radius: 24px;
        border: 2px solid #009d87;
        color: inherit;
        position: relative;
      }

      .news .tablinks.active {
        border-color: #ff8025;
      }

      .news .tablinks::after {
        content: "";
        display: block;
        width: 0;
        height: 0;
        content: "";
        display: block;
        height: 0px;
        border-width: 12px 8px;
        border-style: solid;
        border-color: #00ab98 transparent transparent transparent;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translate(-50%);
      }

      .news .tablinks.active::after {
        border-color: #ff8025 transparent transparent transparent;
      }

      /*==============rwd修正==============*/
      .features,
      .register-link p,
      .brand-text,
      .brand-ex,
      .store-product,
      .news,
      .feedback-list,
      .news-card-wrapper {
        max-width: 1000px;
      }

      .banner-wrapper {
        max-width: 950px;
      }

      @media (min-width: 1441px) {
        .banner-wrapper {
          max-width: 1100px;
        }
      }

      @media (min-width: 1281px) {
        .features,
        .register-link p,
        .brand-text,
        .brand-ex,
        .store-product,
        .news,
        .feedback-list,
        .news-card-wrapper {
          max-width: 1200px;
        }
      }

      .v-enter-active,
      .v-leave-active {
        transition: all 0.4s ease;
      }

      .v-enter-from {
        opacity: 0;
        transform: translateY(20px);
      }

      .v-leave-to {
        opacity: 0;
        transform: translateY(-20px);
      }

      .v-enter-to,
      .v-leave-from {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="section news mx-auto" v-cloak>
      <div class="title fs-1 fw-bold mb-4 text-center">公告專區</div>
      <div class="news-list">
        <!---------- tab links ------------>
        <div class="d-flex gap-3 mx-1">
          <button
            v-for="(tab, key) in tabs"
            :key="key"
            class="tablinks fs-2 fw-bold"
            :class="{ 'active': currentTab === key }"
            @click="currentTab = key"
          >
            {{ tab.label }}
          </button>
        </div>

        <!---------- tab contents ------------>
        <div class="tab-container mt-4">
          <transition mode="out-in">
            <ol :key="currentTab" class="news-list-content tabcontent mb-4">
              <li
                v-for="(item, index) in tabs[currentTab].items"
                :key="index"
                class="news-item py-3"
              >
                <a
                  :href="item.link"
                  target="_blank"
                  class="w-100 d-flex justify-content-between align-items-center"
                >
                  <div>
                    <p class="fs-0 fs-lg-1 news-date">{{ item.date }}</p>
                    <div class="fs-3 fw-bold new-title">{{ item.title }}</div>
                  </div>
                  <span><i class="fa-solid fa-chevron-right"></i></span>
                </a>
              </li>
            </ol>
          </transition>
        </div>
      </div>
      <a href="~/Home/News" target="_blank"
        ><button class="d-block fs-1 fs-md-2 mb-7 mt-5 mx-auto news-more py-3">
          觀看更多
        </button></a
      >
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>

      createApp({

                  {
                    date: "2025/07/15",
                    title:
                      "【 數位分期新選擇 — DUDUPAY 體驗靈活分期，輕鬆又方便！ 】",
                    link: "~/Home/News/newbnpl",
                  },
                  {
                    date: "2025/08/27",
                    title: "【 DUDUPAY新會員搶先招募 】",
                    link: "~/Home/News_1",
                  },
                  {
                    date: "2025/07/01",
                    title: "【 DUDUPAY—理性消費分期新選擇 】",
                    link: "~/Home/News/whats_dudupay",
                  },
                ],
              },
              pets: {
                label: "寵物相關",
                items: [
                  {
                    date: "2025/12/15",
                    title: "【 潮濕天氣增多 毛孩健康亮紅燈 】",
                    link: "~/Home/News/pet_health",
                  },
                  {
                    date: "2025/12/03",
                    title: "【DUDUPAY 寵物展超狂活動登場！ 】",
                    link: "~/Home/News/pet_2",
                  },
                  {
                    date: "2025/12/03",
                    title: "【DUDUPAY 攜手寵物界品牌大軍進駐寵物展！ 】",
                    link: "~/Home/News/pet",
                  },
                  {
                    date: "2025/07/08",
                    title: "【 毛孩旅遊前必備清單 】",
                    link: "~/Home/News/pettravelchecklist",
                  },
                  {
                    date: "2025/07/22",
                    title: "【 寵物口腔護理指南，口腔健康從日常開始！ 】",
                    link: "~/Home/News/pet_oralcare",
                  },
                ],
              },
            },
          };
        },
      }).mount(".news");
    </script>
  </body>
</html>
