<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>商品管理 - 本地測試</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.0/font/bootstrap-icons.css"
    />
    <style>
      .v-enter-active,
      .v-leave-active {
        transition: opacity 1s;
      }
      .v-enter-from,
      .v-leave-to {
        opacity: 0;
      }
      .v-enter-to,
      .v-leave-from {
        opacity: 1;
      }
      td {
        min-width: 92px;
      }
      .date span {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="mt-2 mb-5" style="min-height: 600px">
      <div class="row justify-content-center pt-4">
        <div class="col-sm-12 col-md-12 col-lg-12 col-xxl-9">
          <div class="d-flex justify-content-center">
            <span class="fw-bold p-0" style="color: #00af9a; font-size: 1.7rem"
              >商品管理</span
            >
          </div>

          <div class="tab-content border p-3 mt-3">
            <!-- 商品列表 -->
            <div class="tab-pane fade show active" role="tabpanel">
              <div class="mb-3">
                <!-- 篩選列 -->
                <div
                  class="d-flex justify-content-start mb-2 gap-3 flex-wrap flex-lg-nowrap"
                >
                  <select
                    class="form-select mb-3"
                    v-model="sel_up_down"
                    @change="sel_up_down_class_list(sel_up_down)"
                  >
                    <option value="">--上下架狀態--</option>
                    <option value="all">全部</option>
                    <option value="up">上架</option>
                    <option value="down">下架</option>
                  </select>

                  <select
                    class="form-select mb-3"
                    v-model="sel_class_name"
                    @change="sel_product_class_list(sel_class_name)"
                  >
                    <option value="">--選擇分類--</option>
                    <option value="all">全部</option>
                    <option
                      v-for="v in product_class_listJson"
                      :value="v.class_name"
                    >
                      {{ v.class_name }}
                    </option>
                  </select>

                  <div class="input-group mb-3">
                    <input
                      class="form-control shadow-none search"
                      type="search"
                      placeholder="請輸入商品關鍵字"
                      v-model.trim="query_value"
                    />
                    <div
                      class="input-group-text"
                      @click="query(query_value)"
                      style="cursor: pointer"
                    >
                      <span class="fa fa-search"></span>
                    </div>
                  </div>
                </div>

                <!-- 操作列 -->
                <div class="d-flex justify-content-start mb-2 bg-200">
                  <div class="p-2">
                    <button
                      @click="addProduct()"
                      class="btn btn-danger me-1 mb-1"
                      type="button"
                    >
                      <span class="fas fa-plus me-1"></span>新增商品
                    </button>
                    <button class="btn btn-success me-1 mb-1" type="button">
                      <span class="fas fa-cloud-upload-alt me-1"></span>批次上傳
                    </button>
                  </div>
                </div>

                <!-- 商品表格 -->
                <div class="card-body p-0">
                  <div class="table-responsive scrollbar">
                    <table
                      class="table table-sm table-striped mb-0 overflow-hidden"
                    >
                      <thead class="bg-200 text-900">
                        <tr>
                          <th class="pe-1 align-middle white-space-nowrap">
                            上/下架
                          </th>
                          <th class="pe-1 align-middle white-space-nowrap">
                            圖片
                          </th>
                          <th class="pe-1 align-middle white-space-nowrap">
                            商品名稱
                          </th>
                          <th class="pe-1 align-middle white-space-nowrap">
                            分類
                          </th>
                          <th class="pe-1 white-space-nowrap">連結時效</th>
                          <th class="pe-4 text-end white-space-nowrap">編輯</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr
                          class="btn-reveal-trigger"
                          v-for="v in productListJson"
                          :key="v.product_id"
                        >
                          <td
                            class="py-2 align-middle fw-medium white-space-nowrap"
                          >
                            <div class="form-check form-switch">
                              <input
                                @click="setProductStatus(v)"
                                class="form-check-input"
                                type="checkbox"
                                v-model="v.product_status"
                              />
                            </div>
                          </td>
                          <td class="py-2 align-middle fw-medium">
                            <img
                              style="width: 110px"
                              :src="v.product_imagebase64"
                            />
                          </td>
                          <td class="py-2 align-middle fw-medium">
                            {{ v.product_name }}
                          </td>
                          <td class="py-2 align-middle fw-medium">
                            <span v-if="v.product_class != null">
                              <span v-for="vv in v.product_class">
                                <span v-if="vv.ClassChecked"
                                  >#{{ vv.ClassName }}<br
                                /></span>
                              </span>
                            </span>
                          </td>
                          <td class="py-2 align-middle fw-medium">
                            {{ v.date_s }}~{{ v.date_e }}
                          </td>
                          <td class="date py-2 align-middle text-end fw-medium">
                            <div class="d-flex">
                              <span @click="showEditProduct(v)">
                                <span
                                  class="fas fa-edit text-success fs-2 me-2"
                                ></span>
                              </span>
                              <span @click="toFirstUp(v.product_id)">
                                <span
                                  class="fas fa-tenge text-info fs-2 me-2"
                                ></span>
                              </span>
                              <span @click="delProduct(v.product_id)">
                                <span
                                  class="fas fa-trash-alt text-danger fs-2"
                                ></span>
                              </span>
                            </div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                <!-- 分頁 -->
                <div class="mb-3">
                  <div class="card-footer">
                    <div
                      class="d-flex align-items-center justify-content-center"
                    >
                      <!-- 上一頁 -->
                      <button
                        @click.prevent="setPage(currentPage - 1)"
                        class="btn btn-sm btn-outline-secondary me-1"
                        type="button"
                        title="Previous"
                        :disabled="disabled_prev"
                      >
                        <span class="fa fa-chevron-left fa-w-10"></span>
                      </button>

                      <!-- 頁碼 -->
                      <ul class="pagination mb-0">
                        <li
                          v-for="(n, index) in displayPages"
                          :key="index"
                          :class="{ active: currentPage === n, disabled: n === '...' }"
                          @click.prevent="setPage(n)"
                        >
                          <button
                            class="page btn btn-sm"
                            type="button"
                            :disabled="n === '...'"
                          >
                            {{ n }}
                          </button>
                        </li>
                      </ul>

                      <!-- 下一頁 -->
                      <button
                        @click.prevent="setPage(currentPage + 1)"
                        class="btn btn-sm btn-outline-secondary ms-1"
                        type="button"
                        title="Next"
                        :disabled="disabled_next"
                      >
                        <span class="fa fa-chevron-right fa-w-10"></span>
                      </button>
                    </div>

                    <!-- debug 資訊 -->
                    <div
                      class="text-center text-muted mt-2"
                      style="font-size: 0.8rem"
                    >
                      第 {{ currentPage }} 頁 / 共 {{ totalPage }} 頁，總計 {{
                      totalCount }} 筆 &nbsp;|&nbsp; 篩選模式:
                      <strong>{{ select_mode }}</strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dealerProduct_revise.js"></script>
  </body>
</html>
