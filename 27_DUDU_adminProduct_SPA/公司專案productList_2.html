<link href="~/css/elementPlus/elementPlus.css" rel="stylesheet" />
<link rel="stylesheet" href="~/css/animation/animation.css" />

<style>
  :root {
    --transitionDuration: 0.35s;
  }

  /*ul {
        list-style: none;
        padding: 0;
    }*/

  .li-ean {
    padding: 10px;
    cursor: pointer;
  }

  .li-ean.active {
    background-color: #ffd54f;
    color: red;
    font-weight: bold;
  }

  .hover-box {
    background-color: #e0e0e0;
    border-radius: 12px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hover-box:hover {
    background-color: DeepSkyBlue;
    color: white;
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    cursor: pointer;
  }

  /**/
  .middle {
    transition: 0.5s ease;
    opacity: 0;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    -ms-transform: translate(-50%, -50%);
    text-align: center;
  }

  .container:hover .middle {
    opacity: 1;
  }

  .text {
    background-color: #04aa6d;
    color: white;
    font-size: 16px;
    padding: 16px 32px;
  }

  /*body {
        background-image: url("/img/合作商家-背景圖.jpg");
        background-color: #cccccc;
    }*/

  @@media (max-width: 576px) {
    .pagination {
      flex-wrap: wrap;
      justify-content: center;
    }

    .page-link {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
    }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
    }
  }

  /* menu ul li */
  .nav-bar-custom {
    background-color: DarkSlateGrey;
    color: white;
    border-radius: 6px;
    display: flex;
    justify-content: space-evenly; /* 平均分配每個 li */
    padding: 0;
  }

  .nav-bar-custom .li-ean {
    flex: 1; /* 每個 li 占等寬 */
    text-align: center;
    padding: 10px 0;
    cursor: pointer;
  }

  .nav-bar-custom .active {
    background-color: #2f4f4f;
    border-radius: 6px;
  }

  @@media (max-width: 576px) {
    .nav-bar-custom .li-ean {
      /*flex: 1 1 100%;  每列一個 */
      flex: 1 1 50%; /* 每列兩個 */
    }
  }
  /*-------------------------------*/

  .label_ean {
    display: inline-block;
    padding: 0.5em 1.5em;
    background-color: #e2603c;
    color: white;
    font-weight: bold;
    clip-path: polygon(
      0 0,
      /* 左上角 */ 100% 0,
      /* 右上角 */ calc(100% - 30px) 100%,
      /* 右下角 向左偏移20px */ 0% 100% /* 左下角 */
    );
    /* 左上圓角 */
    border-top-left-radius: 24px;
  }

  /*==============rwd修正==============*/
  .wrapper {
    max-width: 1000px;
  }

  @@media (min-width: 1281px) {
    .wrapper {
      max-width: 1200px;
    }
  }

  /*==============nav-top==============*/
  .nav-top > div {
    flex: 1 0 0;
  }

  .breadcrumb-custom a {
    text-decoration: none;
    color: inherit;
  }

  .breadcrumb-custom a::after {
    content: '';
    width: 0;
    height: 10px;
    display: inline-block;
    height: 0;
    z-index: 9;
    position: relative;
    display: inline-block;
    margin: 0 10px;
    border: 6px solid #5e6e82;
    border-right-width: 0;
    border-top-color: transparent;
    border-bottom-color: transparent;
    vertical-align: inherit;
  }

  .filters svg {
    color: #fff;
  }

  .filters .search {
    border: none;
    height: 32px;
    background-color: rgb(0, 172, 151);
    border-radius: 8px !important;
    width: 32px;
    top: 5px;
    right: 15px;
    bottom: 4px;
    position: absolute;
    z-index: 9;
  }

  .filters .input-group {
    border-radius: 8px;
  }

  .filters .form-select {
    border: 1px solid #8e9294;
    border-radius: 8px;
  }

  /*    category*/
  .category p {
    background-color: #223453;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    color: #fff;
  }

  .category {
    color: inherit;
    text-align: center;
  }

  .category > div {
    background-color: #f7f7f7;
    min-height: 500px;
  }

  .category-item:hover {
    background-color: #26b8a6;
    color: #fff;
  }

  .category-item {
    cursor: pointer;
  }

  .category-item.active {
    background-color: #26b8a6;
    color: #fff;
  }

  @@media (max-width: 992px) {
    .category p {
      display: none;
    }

    .category > div {
      background-color: unset;
      min-height: 0;
      overflow-x: auto;
    }

    .category-item {
      background-color: #f7f7f7;
      border-radius: 8px;
      margin-right: 1rem;
      flex-shrink: 0;
    }
    /*手機分類滿版*/
    .category {
      margin-left: -1rem;
      margin-right: -1rem;
    }
  }

  /*商品圖*/
  .img-fluid {
    aspect-ratio: 1 / 1;
    object-fit: cover;
    transition: 0.5s;
    width: 100%;
  }

  .prd-item:hover .img-fluid {
    transform: scale(1.1);
  }

  .prd-name {
    color: #000;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    display: -webkit-box;
    overflow: hidden;
  }

  p.price {
    color: #e8456b;
  }

  p.store {
    color: #8e9294;
  }

  .category .flex-lg-column > div {
    flex-shrink: 0;
  }

  /*搜尋框叉叉*/
  input[type='search']::-webkit-search-cancel-button {
    -webkit-appearance: none;
    appearance: none;
    display: none;
  }

  /* 右側清除按鈕樣式 */
  .clear-btn {
    position: absolute;
    right: 58px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    background-color: #5f6368;
    color: white;
    border-radius: 50% !important;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 12px;
    transition: opacity 0.2s ease;
    z-index: 3;
  }

  /* 3. 打字時出現叉叉 */
  .clear-btn.active {
    opacity: 1;
    visibility: visible;
  }

  .clear-btn:hover {
    background-color: #3c4043;
  }

  /* -------- 三層分類 --------- */
  :root {
    --primary-color: rgb(0 168 150);
    --light-green: rgb(240 253 250);
  }

  .category-outer-wrapper {
    --el-menu-hover-bg-color: rgb(249 250 251); /* 不管有幾層，都帶此變數，main獨立寫 */
    --el-menu-active-color: rgb(0 168 150);
  }

  .pc-category-wrapper {
    border-radius: 8px;
    border: 1px solid #eee;
    overflow: hidden;
    box-shadow: 0 5px 5px 0 rgba(0, 0, 0, 0.05);
  }

  ul.el-menu.el-menu--vertical.el-menu-vertical-demo {
    border-right: none;
  }

  /* sub-menu按文字才會call api */
  .el-sub-menu__title span:hover {
    text-decoration: underline;
  }

  /* main */
  .pc-category-wrapper > ul > .el-sub-menu {
    background-color: var(--primary-color);
  }

  .pc-category-wrapper > ul > .el-sub-menu > .el-sub-menu__title {
    color: #fff;
  }

  .pc-category-wrapper > ul > .el-sub-menu > .el-sub-menu__title:hover {
    --el-menu-hover-bg-color: rgb(13 148 136);
  }

  /* sub-menu */
  .el-sub-menu .el-sub-menu__title {
    font-size: 1rem;
    letter-spacing: 1px;
  }

  /* menu-item */
  .el-menu-item.is-active {
    font-weight: bold;
    background-color: var(--light-green);
    position: relative;
  }

  .el-menu-item.is-active::before {
    content: '';
    position: absolute;
    inset: 0;
    border-left: 3px solid var(--primary-color);
  }

  /* 手機版 el-button el-drawer*/
  .mb-btn-selector-wrapper {
    --el-border-color: rgb(142, 146, 148);
    --el-border-radius-base: 8px;
  }

  .cm-mobile-drawer .el-drawer__body > ul > .el-sub-menu > .el-sub-menu__title {
    border-bottom: 1px solid var(--el-border-color);
  }

  .mb-btn-selector-wrapper .el-button {
    height: 42px; /* 跟上方的搜尋框同高 */
    justify-content: start;
  }

  .mb-btn-selector-wrapper::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-right: 1px solid var(--el-border-color);
    border-bottom: 1px solid var(--el-border-color);
    transform: rotate(-45deg);
    top: 50%;
    right: 20px;
    transform: translate(-50%, -50%) rotate(45deg);
  }
</style>

<div id="app" class="mb-5" style="min-height: 600px" v-cloak>
  <div class="wrapper mx-auto">
    <div class="nav-top d-flex flex-between-center mt-3 mb-2 my-md-4 flex-column flex-md-row">
      <div class="w-100">
        <div class="label_ean fs-1 fs-sm-2 fs-xl-3 w-50 mb-2 d-none d-md-block" v-if="!u.show">
          全部商品
        </div>
        <div class="label_ean fs-1 fs-sm-2 fs-xl-3 w-50 mb-2 d-none d-md-block" v-if="u.show">
          {{u.class_name}}
        </div>
        <div class="breadcrumb-custom fs-0">
          @*<a href="~/Home/Index">首頁</a><span class="fas fa-angle-right ms-2 me-2"></span
          ><a href="~/Home/Storelist">購物商城</a>
          <span v-if="u.show"
            ><span class="fas fa-angle-right ms-2 me-2"></span>{{u.class_name}} </span
          >*@ <a href="~/Home/Index">首頁</a><a href="~/Home/Storelist">購物商城</a>
          <span v-if="u.show">{{u.class_name}} </span>
        </div>
      </div>
      <div class="filters w-100">
        <div class="d-flex justify-content-end">
          <div class="p-md-2 pt-2 w-100">
            <div class="input-group">
              <input
                class="form-control fs-0 py-2"
                v-model.trim="search_value"
                type="search"
                placeholder="請輸入欲搜尋的商品"
                aria-label="search"
                style="border: 1px solid #8e9294; border-radius: 8px"
                @@keyup.enter="search(search_value)"
              />
              <!-- 清除按鈕 -->
              <div class="clear-btn" v-show="search_value.trim().length > 0" @@click="clearSearch">
                @*<i class="fa-solid fa-xmark"></i>*@
                <span class="fas fa-times"></span>
              </div>
              <a :href="'?searchValue=' + search_value">
                <div
                  class="search align-items-center input-group-text justify-content-center"
                  @@click="search(search_value)"
                >
                  <span class="fa fa-search fa-w-16 fs-0"></span>
                </div>
              </a>
            </div>
          </div>
        </div>

        <div class="d-flex">
          <!-- todo : 縣市選單目前只是前端篩選 功能待開發 先隱藏 -->
          <div class="md-md-0 me-1 mt-2 mt-md-0 p-md-2 w-50 d-none">
            <select
              class="form-select"
              @@change="selCity(selectedCity)"
              v-model="selectedCity"
              style=""
            >
              <option value="" disabled selected>所在地區</option>
              <option v-for="(districts, city) in taiwanCities" :key="city" :value="city">
                {{ city }}
              </option>
            </select>
          </div>

          <!-- todo : 價格排序目前只是前端篩選 功能待開發 先隱藏 -->
          <div class="p-md-2 pt-2 w-50 d-none">
            <div class="d-flex justify-content-end">
              <select class="form-select" @@change="selPrice(sel_value)" v-model="sel_value">
                <option value="" disabled selected>商品排序</option>
                <option value="1">依價格由低到高</option>
                <option value="2">依價格由高到低</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row product-wrapper">
      <div class="col-12 col-lg-2 mb-3">
        <!-- ===== 三層分類el-menu 開始===== -->
        @*
        <div class="category">
          <p class="fs-0 py-3 mb-0">商品分類</p>
          <div class="w-100 d-flex flex-lg-column px-3 px-lg-0">
            <div v-for="v in json1" @@click="selType(v.id,v.text)">
              <div
                :class="[selectedId === v.id ? 'active' :'','category-item fs-0 px-3 px-lg-0 py-3']"
                @@click="selectedId = v.id"
              >
                <span v-if="selectedId === v.id"> </span><span>{{v.text}}</span>
              </div>
            </div>
          </div>
        </div>
        *@
        <div class="category-outer-wrapper">
          <!-- 桌機：左側垂直收合選單 -->
          <div class="pc-category-wrapper d-none d-md-block">
            <el-menu :default-openeds="['7']" class="el-menu-vertical-demo">
              <el-sub-menu
                v-for="main in categories"
                :key="main.categoryId"
                :index="String(main.categoryId)"
              >
                <template #title>
                  <span @@click="handleMenuClick(main.categoryId)">{{ main.name }}</span>
                </template>

                <el-sub-menu
                  v-for="sub in main.children"
                  :key="sub.categoryId"
                  :index="String(sub.categoryId)"
                >
                  <template #title>
                    <span @@click="handleMenuClick(main.categoryId)">{{ sub.name }}</span>
                  </template>

                  <el-menu-item
                    v-for="leaf in sub.children"
                    :key="leaf.categoryId"
                    :index="String(leaf.categoryId)"
                    @@click="handleMenuClick(leaf.categoryId)"
                  >
                    {{ leaf.name }}
                  </el-menu-item>
                </el-sub-menu>
              </el-sub-menu>
            </el-menu>
          </div>

          <!-- 手機：下拉按鈕，點擊開啟全屏面板 -->
          <div class="mb-btn-selector-wrapper d-block d-md-none position-relative">
            <el-button class="w-100" @@click="drawerVisible = true"> 分類篩選 </el-button>
          </div>

          <el-drawer
            v-model="drawerVisible"
            title="分類篩選"
            direction="btt"
            size="100%"
            class="cm-mobile-drawer"
          >
            <el-menu :default-openeds="['7']" class="el-menu-vertical-demo">
              <el-sub-menu
                v-for="main in categories"
                :key="main.categoryId"
                :index="String(main.categoryId)"
              >
                <template #title>
                  <span @@click="handleMenuClick(main.categoryId)">{{ main.name }}</span>
                </template>

                <el-sub-menu
                  v-for="sub in main.children"
                  :key="sub.categoryId"
                  :index="String(sub.categoryId)"
                >
                  <template #title>
                    <span @@click="handleMenuClick(main.categoryId)">{{ sub.name }}</span>
                  </template>

                  <el-menu-item
                    v-for="leaf in sub.children"
                    :key="leaf.categoryId"
                    :index="String(leaf.categoryId)"
                    @@click="handleMenuClick(leaf.categoryId)"
                  >
                    {{ leaf.name }}
                  </el-menu-item>
                </el-sub-menu>
              </el-sub-menu>
            </el-menu>
          </el-drawer>
        </div>

        <!-- ===== 三層分類el-menu 結束===== -->
      </div>
      <div class="col-12 col-lg-10 product-list-wrapper fadeUp">
        <div v-if="showJson.length === 0 && keep_class_id === 'search'">
          找不到與「 {{search_result}} 」有關的搜尋結果
        </div>
        <div class="row">
          <div
            v-for="(prd,index) in productList"
            :key="prd.productId"
            class="prd-item col-6 col-sm-6 col-md-6 col-lg-4 col-xl-3"
          >
            <div class="overflow-hidden mb-3">
              <a class="text-800" style="text-decoration: none">
                <div class="mb-3 overflow-hidden" style="border-radius: 8px">
                  <img
                    class="img-fluid"
                    :src="`https://picsum.photos/seed/p${index + 1}/110/110`"
                  />
                </div>
                <div class="">
                  <span class="prd-name fs-0 fs-md-1">{{prd.name}}</span>
                  <p class="price">${{prd.price}}</p>
                  @*
                  <p class="store"></p>
                  *@
                </div>
              </a>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="mb-3" data-list='{"pagination":true}'>
            <div class="card-footer">
              <div class="d-flex align-items-center justify-content-center">
                <!-- 上一頁 -->
                <button
                  @@click.prevent="setPage(currentPage-1)"
                  class="btn btn-sm btn-falcon-default me-1"
                  type="button"
                  title="Previous"
                  :disabled="disabled_prev"
                >
                  <span class="fa fa-chevron-left fa-w-10"></span>
                </button>

                <!-- 頁碼 -->
                <ul class="pagination mb-0">
                  <li
                    v-for="(n, index) in displayPages"
                    :key="index"
                    :class="{'active': currentPage === n, 'disabled': n === '...'}"
                    @@click.prevent="setPage(n)"
                  >
                    <button class="page btn btn-sm" type="button" :disabled="n === '...'">
                      {{ n }}
                    </button>
                  </li>
                </ul>

                <!-- 下一頁 -->
                <button
                  @@click.prevent="setPage(currentPage+1)"
                  class="btn btn-sm btn-falcon-default ms-1"
                  type="button"
                  title="Next"
                  :disabled="disabled_next"
                >
                  <span class="fa fa-chevron-right fa-w-10"></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="~/js/common.js?v=1.0"></script>
<script src="~/js/elementPlus/elementPlus.js"></script>
<script src="~/js/adminProduct/productList_2.js"></script>
