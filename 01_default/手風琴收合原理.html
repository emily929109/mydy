<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .collapse-header {
        background-color: #f5f5f5;
        padding: 12px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }

      /* 核心：預設高度為 0，並且把超出範圍的內容藏起來 */
      .collapse-content {
        height: 0px;
        overflow: hidden;
        transition: height 0.3s ease; /* 讓高度變化時擁有 0.3 秒的平滑動畫 */
        background-color: #fafafa;
      }

      /* 內層補丁：用來撐開真實高度，不要把 padding 寫在 collapse-content 上 */
      .content-inner {
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="collapse-item">
      <div class="collapse-header" onclick="toggleCollapse(this)">
        <span>犬(狗)</span>
        <span class="arrow">▼</span>
      </div>
      <div class="collapse-content">
        <div class="content-inner">
          <p>狗飼料/乾糧</p>
          <p>狗罐頭/鮮食</p>
          <p>狗類零食</p>
        </div>
      </div>
    </div>
    <script>
      function toggleCollapse(headerElement) {
        // 1. 透過標題，找到它緊鄰的下一個兄弟節點（即 collapse-content）
        const content = headerElement.nextElementSibling;
        const arrow = headerElement.querySelector(".arrow");

        // 2. 判斷目前高度是否為 0px（代表目前是收合狀態）
        if (content.style.height === "0px" || !content.style.height) {
          // 💡 關鍵魔法：scrollHeight 可以抓到該元素在「完全展開時」所需的實際總高度
          const realHeight = content.scrollHeight;

          // 將高度設為實際高度，觸發 CSS transition 動畫向下展開
          content.style.height = realHeight + "px";
          arrow.style.transform = "rotate(180deg)"; // 箭頭轉向
        } else {
          // 3. 如果目前是展開狀態，直接將高度切回 0px，觸發向上收合動畫
          content.style.height = "0px";
          arrow.style.transform = "rotate(0deg)"; // 箭頭恢復
        }
      }
    </script>
  </body>
</html>
