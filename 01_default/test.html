<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>test</title>
    <style>
      html {
        /* 防止 iOS 上的瀏覽器自動調整文字大小 */
        -webkit-text-size-adjust: 100%;
        /* 防止其他移動端瀏覽器自動調整 */
        -moz-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        text-size-adjust: 100%;
        font-family: sans-serif;
      }

      /* 針對 Android Chrome/WebView 的強制修復 */
      html * {
        max-height: 999999px;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div>test</div>
  </body>
</html>
